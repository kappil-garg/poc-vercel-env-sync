name: Sync secrets to Vercel

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  VERCEL_PROJECT_NAME: ${{ vars.VERCEL_PROJECT_NAME || 'poc-vercel-env-sync' }}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync GOOGLE_OAUTH_CLIENT_ID to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          # VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$GOOGLE_OAUTH_CLIENT_ID" ]; then
            echo "::error::GOOGLE_OAUTH_CLIENT_ID secret is not set"
            exit 1
          fi

          PROJECT="${{ env.VERCEL_PROJECT_NAME }}"
          QUERY="upsert=true"
          # QUERY="upsert=true&teamId=${VERCEL_TEAM_ID}"

          BODY=$(jq -n \
            --arg key "GOOGLE_OAUTH_CLIENT_ID" \
            --arg value "$GOOGLE_OAUTH_CLIENT_ID" \
            '{key: $key, value: $value, type: "encrypted", target: ["production", "preview", "development"]}'
          )

          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.vercel.com/v10/projects/${PROJECT}/env?${QUERY}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          HTTP_CODE=$(echo "$RESP" | tail -n1)
          BODY_RESP=$(echo "$RESP" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Synced GOOGLE_OAUTH_CLIENT_ID to Vercel project ${PROJECT} (HTTP ${HTTP_CODE})"
            echo "$BODY_RESP" | head -c 500
          else
            echo "::error::Vercel API returned HTTP ${HTTP_CODE}"
            echo "$BODY_RESP"
            exit 1
          fi

      - name: Trigger Vercel deployment via Deploy Hook
        run: |
          HOOK_RESP=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}")
          if [ "$HOOK_RESP" -ge 200 ] && [ "$HOOK_RESP" -lt 300 ]; then
            echo "Vercel deployment triggered (HTTP ${HOOK_RESP})"
          else
            echo "::error::Deploy Hook returned HTTP ${HOOK_RESP}"
            exit 1
          fi
